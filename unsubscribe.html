<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsubscribe — This Week in AI</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f5f0e8; --card: #fdfaf4; --border: #e2d9c8;
            --ink: #1a1612; --muted: #8a7f72; --accent: #e8531a;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: var(--card);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 2px 0 var(--border), 0 8px 32px rgba(26,22,18,0.07);
        }
        .icon { font-size: 44px; margin-bottom: 16px; }
        h1 {
            font-family: 'Instrument Serif', serif;
            font-size: 28px;
            color: var(--ink);
            margin-bottom: 12px;
        }
        p { font-size: 15px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
        .email-badge {
            display: inline-block;
            background: #fef3c7;
            border: 1px solid #fcd34d;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 14px;
            color: #92400e;
            font-weight: 600;
            margin: 8px 0 20px;
        }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: #dc2626;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            transition: background 0.2s;
            text-decoration: none;
            margin-bottom: 12px;
        }
        .btn:hover { background: #b91c1c; }
        .back {
            display: block;
            margin-top: 16px;
            font-size: 13px;
            color: var(--muted);
            text-decoration: none;
        }
        .back:hover { color: var(--accent); }

        /* Confirmed state */
        .confirmed { display: none; }
        .confirmed .icon { font-size: 44px; }
    </style>
</head>
<body>
<div class="card">

    <div id="default-view">
        <div class="icon">😢</div>
        <h1>Unsubscribe</h1>
        <p>We're sorry to see you go.<br>This will remove you from the list:</p>
        <div class="email-badge" id="email-display">loading...</div>
        <br>
        <a id="mailto-btn" href="#" class="btn">Yes, unsubscribe me</a>
        <a href="index.html" class="back">← Actually, keep me subscribed</a>
    </div>

    <div class="confirmed" id="confirmed-view">
        <div class="icon">✅</div>
        <h1>Done!</h1>
        <p>Your unsubscribe request has been sent.<br>You'll be removed within 24 hours.</p>
        <a href="index.html" class="back">← Back to homepage</a>
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const email  = params.get("email") || "unknown";

    document.getElementById("email-display").textContent = email;

    // Clicking the button opens a mailto to the newsletter owner
    // They then run: python remove_subscriber.py EMAIL
    const subject = encodeURIComponent("Unsubscribe request: " + email);
    const body    = encodeURIComponent(`Please unsubscribe this email from the AI Newsletter:\n\n${email}`);

    document.getElementById("mailto-btn").href =
        `mailto:itzaipxx@gmail.com?subject=${subject}&body=${body}`;

    document.getElementById("mailto-btn").addEventListener("click", () => {
        setTimeout(() => {
            document.getElementById("default-view").style.display = "none";
            document.getElementById("confirmed-view").style.display = "block";
        }, 500);
    });
</script>
</body>
</html>
